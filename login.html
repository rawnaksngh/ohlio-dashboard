<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Oli-Ohh Command Center Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',Arial;
}

body{

height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(270deg,#0f2027,#203a43,#2c5364,#0f2027);
background-size:600% 600%;
animation:bgMove 12s ease infinite;
color:white;
overflow:hidden;

}

/* animated background */

@keyframes bgMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

/* floating glow circles */

.circle{
position:absolute;
border-radius:50%;
background:rgba(0,255,213,0.15);
animation:float 8s infinite ease-in-out;
}

.circle:nth-child(1){
width:200px;
height:200px;
left:10%;
top:20%;
}

.circle:nth-child(2){
width:300px;
height:300px;
right:15%;
bottom:10%;
animation-delay:2s;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-40px);}
100%{transform:translateY(0px);}
}

/* login box */

.login-box{

position:relative;
width:360px;
padding:45px;
border-radius:20px;

background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);

box-shadow:0 20px 60px rgba(0,0,0,0.5);

animation:boxFade 1.2s ease;

}

@keyframes boxFade{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.login-box h1{

font-size:26px;
margin-bottom:5px;
text-align:center;

}

.login-box p{

font-size:13px;
text-align:center;
opacity:.7;
margin-bottom:25px;

}

/* inputs */

input{

width:100%;
padding:13px;
margin-top:12px;

border-radius:8px;
border:none;
outline:none;

background:rgba(255,255,255,0.1);
color:white;

transition:.3s;

}

input::placeholder{
color:#ccc;
}

input:focus{

background:rgba(255,255,255,0.2);
transform:scale(1.02);

}

/* login button */

button{

width:100%;
padding:13px;
margin-top:18px;

border:none;
border-radius:8px;

background:linear-gradient(135deg,#00ffd5,#00a6ff);

font-weight:bold;
font-size:15px;
cursor:pointer;

transition:.3s;

}

button:hover{

transform:scale(1.05);
box-shadow:0 0 15px #00ffd5;

}

/* extra text */

.footer-text{

margin-top:18px;
font-size:12px;
text-align:center;
opacity:.7;

}

.error{
margin-top:10px;
color:#ff6b6b;
font-size:13px;
text-align:center;
}

</style>
</head>

<body>

<div class="circle"></div>
<div class="circle"></div>

<div class="login-box">

<h1>Oli-Ohh</h1>
<p>Launch Command Center</p>

<input type="text" id="username" placeholder="Enter Username">

<input type="password" id="password" placeholder="Enter Password">

<button onclick="login()">Login</button>

<p id="msg" class="error"></p>

<div class="footer-text">
Retail Expansion Dashboard<br>
Internal Access Only
</div>

</div>

<script>

function login(){

const user=document.getElementById("username").value;
const pass=document.getElementById("password").value;

if(user==="admin" && pass==="olioh123"){

sessionStorage.setItem("loggedIn","true");
window.location.href="index.html";

}else{

document.getElementById("msg").innerText="Invalid Username or Password";

}

}

</script>

</body>
</html>
