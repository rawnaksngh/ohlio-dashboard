<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oli-Ohh | Channel Summary (Dark)</title>
    <style>
        /* SF Pro Style Typography */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body { 
            background: #000000; 
            color: #ffffff;
            padding: 30px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* NAVIGATION & HOME BUTTON */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .home-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            backdrop-filter: blur(10px);
            border: 0.5px solid rgba(255, 255, 255, 0.2);
            transition: background 0.2s;
        }

        .home-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* HEADER */
        .header {
            margin-bottom: 40px;
            padding: 0 10px;
        }

        .header h1 {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .header p {
            color: #8e8e93;
            font-size: 17px;
            margin-top: 4px;
        }

        /* GROUPED TABLE CONTAINER */
        .table-wrapper {
            background: #1c1c1e; 
            border-radius: 12px;
            overflow-x: auto;
            border: 0.5px solid #38383a;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 900px;
        }

        th {
            background: #2c2c2e;
            text-align: left;
            padding: 14px 20px;
            font-size: 12px;
            font-weight: 600;
            color: #8e8e93;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 0.5px solid #38383a;
        }

        td {
            padding: 18px 20px;
            border-bottom: 0.5px solid #38383a;
            vertical-align: top;
            font-size: 15px;
        }

        tr:last-child td { border-bottom: none; }

        .channel-name {
            font-size: 17px;
            font-weight: 600;
            color: #0a84ff;
            margin-bottom: 6px;
        }

        .badge {
            font-size: 11px;
            background: rgba(10, 132, 255, 0.15);
            color: #0a84ff;
            padding: 3px 8px;
            border-radius: 6px;
            font-weight: 600;
        }

        /* LANDING PRICE CARD */
        .landing-card {
            background: #242426;
            border: 1px solid #30d158;
            border-radius: 10px;
            padding: 12px;
            box-shadow: 0 4px 12px rgba(48, 209, 88, 0.1);
        }

        .landing-label {
            font-size: 10px;
            font-weight: 700;
            color: #30d158;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .landing-price {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            line-height: 1.4;
        }

        .scheme-text {
            font-size: 13px;
            line-height: 1.6;
            color: #f2f2f7;
            white-space: pre-line;
        }

        .hold { color: #636366; text-decoration: line-through; }
        .active { color: #32d74b; font-weight: 500; }

        .markup-highlight {
            color: #ffd60a;
            font-weight: 700;
            font-size: 16px;
        }

        .markdown-small {
            font-size: 12px;
            color: #8e8e93;
            margin-top: 4px;
        }

        .approver-tag {
            font-size: 11px;
            color: #8e8e93;
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .check-icon { color: #30d158; font-weight: bold; }

    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <a href="home.html" class="home-btn">← Home</a>
        <div style="font-size: 12px; color: #8e8e93; font-weight: 600;">TRANS_ID: AMJ2026</div>
    </div>

    <div class="header">
        <h1>Oli-Ohh Pasta</h1>
        <p>AMJ 2026 Cycle • Scheme Summary</p>
    </div>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Channel Details</th>
                    <th>Schemes (Status)</th>
                    <th>Trade Price</th>
                    <th style="color: #30d158;">Net Landing</th>
                    <th>Markup</th>
                    <th>Validity</th>
                </tr>
            </thead>
            <tbody id="ios-dark-data">
                </tbody>
        </table>
    </div>
</div>

<script>
    const channels = ["General Trade", "MR Standalone", "Wholesale", "MT Regional"];
    const tableBody = document.getElementById('ios-dark-data');

    channels.forEach(name => {
        tableBody.innerHTML += `
            <tr>
                <td>
                    <div class="channel-name">${name}</div>
                    <span class="badge">F2 FREQUENCY</span>
                    <div class="approver-tag">
                        <span class="check-icon">✓</span> Verified: Deepak Sir
                    </div>
                </td>
                <td class="scheme-text">
                    <div class="hold">6 Pcs (10%) - Hold</div>
                    <div class="hold">12 Pcs (10%) - Hold</div>
                    <div class="active">36 Pcs (12%) - Started</div>
                    <div class="active">72 Pcs (15%) - Started</div>
                </td>
                <td>
                    <div style="font-weight: 600;">₹89.00 <span style="font-size: 11px; color:#8e8e93;">MRP</span></div>
                    <div style="font-size: 13px; color: #8e8e93; margin-top: 4px;">RLP: ₹77.39</div>
                </td>
                <td>
                    <div class="landing-card">
                        <div class="landing-label">Net Cost</div>
                        <div class="landing-price">
                            ₹68.12 <small style="font-size: 11px; color: #8e8e93;">(1C)</small><br>
                            ₹65.78 <small style="font-size: 11px; color: #8e8e93;">(2C)</small>
                        </div>
                    </div>
                </td>
                <td>
                    <div class="markup-highlight">30.65%</div>
                    <div class="markdown-small">MKDN: 23.46%</div>
                    <div class="markup-highlight" style="margin-top: 8px;">35.29%</div>
                    <div class="markdown-small">MKDN: 26.08%</div>
                </td>
                <td style="font-size: 12px; color: #8e8e93; line-height: 1.4;">
                    01/04/2026<br>to<br>30/06/2026
                </td>
            </tr>
        `;
    });
</script>

</body>
</html>
