:root {
    --primary: #00ffd5;
    --secondary: #0077ff;

    --bronze: #cd7f32;
    --bg: #050a0e;

* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Rajdhani', sans-serif; }

body { background-color: var(--bg); color: white; min-height: 100vh; padding: 15px; overflow-x: hidden; }

.grid-overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background-image: linear-gradient(rgba(0, 255, 213, 0.03) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(0, 255, 213, 0.03) 1px, transparent 1px);
    background-size: 45px 45px; z-index: -1; animation: moveGrid 30s linear infinite;
}
@keyframes moveGrid { from { transform: translateY(0); } to { transform: translateY(45px); } }

header { 
    max-width: 1300px; margin: 0 auto 30px; padding: 20px 0;
    display: flex; flex-direction: column; align-items: center; gap: 15px; text-align: center;
}

.back-btn {
    padding: 10px 25px; border-radius: 8px; background: var(--glass); border: 1px solid var(--primary);
    color: var(--primary); text-decoration: none; font-weight: 700; font-family: 'Orbitron'; font-size: 11px;
    transition: 0.3s; letter-spacing: 1px; cursor: pointer;
}
.back-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 20px var(--primary); }

header h1 { 
    font-family: 'Orbitron', sans-serif; font-size: clamp(1.6rem, 5vw, 3.2rem); 
    background: linear-gradient(90deg, #fff, var(--primary), var(--secondary));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 4px; text-shadow: 0 0 30px rgba(0,255,213,0.2);
}
header p { color: var(--primary); letter-spacing: 3px; font-weight: 400; font-size: clamp(10px, 2vw, 13px); opacity: 0.8; }

.controls-panel {
    max-width: 1300px; margin: 0 auto 40px; background: var(--glass); border: 1px solid var(--border);
    padding: 25px; border-radius: 20px; backdrop-filter: blur(20px);
}
.search-row { display: flex; gap: 15px; margin-bottom: 25px; }
.search-row input {
    flex: 1; padding: 15px 20px; border-radius: 10px; border: 1px solid var(--border);
    background: rgba(0,0,0,0.6); color: var(--primary); font-size: 16px; outline: none;
}
.master-reset-btn {
    padding: 0 25px; border-radius: 10px; background: linear-gradient(45deg, var(--secondary), var(--primary));
    border: none; color: #000; font-weight: 800; cursor: pointer; font-family: 'Orbitron';
}

.filter-section { margin-bottom: 20px; }
.filter-label { font-size: 10px; color: var(--primary); letter-spacing: 2px; margin-bottom: 10px; display: block; font-weight: 700; opacity: 0.6; }
.chips { display: flex; flex-wrap: wrap; gap: 10px; }
.chip {
    padding: 8px 16px; border-radius: 8px; font-size: 12px; cursor: pointer; font-weight: 600;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border); transition: 0.3s;
}
.chip.active { background: var(--secondary); border-color: var(--primary); color: white; box-shadow: 0 0 10px var(--secondary); }

.roadmap-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; max-width: 1400px; margin: 0 auto; }

.store-card {
    background: var(--glass); padding: 35px 20px; border-radius: 20px; border: 1px solid var(--border);
    cursor: pointer; transition: 0.4s; text-align: center; position: relative;
}

.store-card.platinum { border-color: var(--platinum); box-shadow: 0 0 15px rgba(0,242,255,0.15); }
.store-card.gold { border-color: var(--gold); }
.store-card.silver { border-color: var(--silver); }
.store-card.bronze { border-color: var(--bronze); }
.store-card.others { border-color: var(--border); }

.store-card:hover { transform: translateY(-10px); background: rgba(255,255,255,0.07); border-color: var(--primary); }

.store-card h3 { font-size: 18px; color: #fff; margin-bottom: 5px; }
.sales-note { font-size: 10px; color: var(--primary); font-weight: 700; margin-bottom: 12px; opacity: 0.9; letter-spacing: 1px; }
.badge { font-size: 9px; color: var(--primary); border: 1px solid var(--primary); padding: 3px 10px; border-radius: 4px; display: inline-block; margin-bottom: 15px; font-weight: 700; text-transform: uppercase; }
.sales-display { font-size: 24px; font-weight: bold; color: var(--primary); text-shadow: 0 0 10px rgba(0,255,213,0.3); }

#modalOverlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92);
    backdrop-filter: blur(15px); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 15px;
}
.report-modal {
    background: #0a1118; width: 100%; max-width: 850px; border-radius: 25px; border: 1px solid var(--primary);
    display: flex; overflow: hidden; position: relative; max-height: 90vh;
}
.modal-dna { flex: 1; padding: 40px; background: rgba(0,0,0,0.4); border-right: 1px solid var(--border); overflow-y: auto; }
.modal-stats { flex: 1.3; padding: 40px; overflow-y: auto; }
.close-modal { position: absolute; top: 20px; right: 25px; font-size: 35px; cursor: pointer; color: var(--primary); z-index: 10; }

@media (max-width: 768px) {
    .search-row { flex-direction: column; }
    .report-modal { flex-direction: column; }
    .modal-dna { border-right: none; border-bottom: 1px solid var(--border); flex: none; }
    .roadmap-grid { grid-template-columns: 1fr; }
}
</style>
</head>

];

const grid = document.getElementById('outletGrid');
const searchInput = document.getElementById('mainSearch');
const modal = document.getElementById('modalOverlay');

let f_reg = 'all', f_chan = 'all', f_typ = 'all';

const regions = [...new Set(storeList.map(s => s.region))].sort();
const channels = [...new Set(storeList.map(s => s.channel))].sort();
const tiers = ["Platinum", "Gold", "Silver", "Bronze", "Others"];

function initFilters(boxId, list, category) {
    const box = document.getElementById(boxId);
    box.innerHTML = `<div class="chip active" data-val="all">ALL</div>`;
    list.forEach(v => {
        const div = document.createElement('div');
        div.className = 'chip';
        div.textContent = v.toUpperCase();
        div.onclick = () => {
            box.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            div.classList.add('active');
            if(category === 'reg') f_reg = v;
            if(category === 'chan') f_chan = v;
            if(category === 'typ') f_typ = v;
            applyFilters();
        };
        box.appendChild(div);
    });
    box.querySelector('[data-val="all"]').onclick = (e) => {
        box.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        if(category === 'reg') f_reg = 'all';
        if(category === 'chan') f_chan = 'all';
        if(category === 'typ') f_typ = 'all';
        applyFilters();
    };
}

function render(data) {
    grid.innerHTML = '';
    data.forEach(s => {
        const div = document.createElement('div');
        const glow = (s.tier || 'others').toLowerCase();
        div.className = `store-card ${glow}`;
        div.innerHTML = `
            <span class="badge">${s.tier}</span>
            <h3>${s.name}</h3>
            <div class="sales-note">P6M AVG REVENUE AS PER LINDT</div>
            <div class="sales-display">${s.sales}</div>
            <div style="font-size:11px; margin-top:15px; color:var(--primary); opacity:0.7;">${s.region} | ${s.channel}</div>
        `;
        div.onclick = () => openModal(s);
        grid.appendChild(div);
    });
}

function openModal(s) {
    document.getElementById('mName').textContent = s.fullName;
    document.getElementById('mType').textContent = s.tier;
    document.getElementById('mTotal').textContent = s.sales;
    const details = [{lbl: 'Region', val: s.region}, {lbl: 'Partner', val: s.channel}, {lbl: 'Seller', val: s.seller}];
    const detCont = document.getElementById('modalDetails');
    detCont.innerHTML = '';
    details.forEach(d => {
        detCont.innerHTML += `<div style="margin-bottom:15px;"><span style="font-size:9px; color:var(--primary); opacity:0.5; text-transform:uppercase;">${d.lbl}</span><div style="font-size:17px; font-weight:700;">${d.val}</div></div>`;
    });
    const tbody = document.getElementById('mTableBody');
    tbody.innerHTML = '';
    for (const [m, v] of Object.entries(s.monthly)) {
        tbody.innerHTML += `<tr style="border-bottom:1px solid rgba(255,255,255,0.05);"><td style="padding:12px 0;">${m}</td><td style="text-align:right; font-weight:800;">${v}</td></tr>`;
    }
    modal.style.display = 'flex';
}

function applyFilters() {
    const q = searchInput.value.toLowerCase();
    const filtered = storeList.filter(s => {
        const matchQ = s.name.toLowerCase().includes(q) || s.region.toLowerCase().includes(q) || s.seller.toLowerCase().includes(q);
        const matchR = f_reg === 'all' || s.region === f_reg;
        const matchC = f_chan === 'all' || s.channel === f_chan;
        const matchT = f_typ === 'all' || s.tier === f_typ;
        return matchQ && matchR && matchC && matchT;
    });
    render(filtered);
}

document.getElementById('closeM').onclick = () => modal.style.display = 'none';
window.onclick = (e) => { if(e.target == modal) modal.style.display = 'none'; }
searchInput.oninput = applyFilters;

initFilters('regionChips', regions, 'reg');
initFilters('channelChips', channels, 'chan');
initFilters('typeChips', tiers, 'typ');
render(storeList);
</script>
