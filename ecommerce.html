<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futuristic iOS Merchant Dashboard</title>
    <style>
        :root {
            --bg: #010204;
            --card-bg: rgba(12, 14, 18, 0.7);
            --ios-blur: blur(35px) saturate(210%);
            --amazon: #FF9900;
            --flipkart: #2874f0;
            --meesho: #ff4e83;
            --live-green: #00ffaa;
            --segment-bg: rgba(255, 255, 255, 0.05);
            --border-glow: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, sans-serif;
        }

        body {
            background-color: var(--bg);
            /* Futuristic Grid Background */
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(0, 242, 255, 0.1) 0%, transparent 50%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 60px 60px, 60px 60px;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            padding: 40px 20px;
        }

        h1 {
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 10px;
            margin-bottom: 60px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
        }

        .container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
            perspective: 2000px;
            width: 100%;
            max-width: 1200px;
        }

        /* --- iOS Glass Card --- */
        .card {
            width: 340px;
            background: var(--card-bg);
            backdrop-filter: var(--ios-blur);
            -webkit-backdrop-filter: var(--ios-blur);
            border: 1px solid var(--border-glow);
            border-radius: 40px;
            padding: 40px 30px;
            position: relative;
            transition: all 0.6s cubic-bezier(0.15, 0.83, 0.66, 1);
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-15px) rotateX(10deg);
            border-color: rgba(255, 255, 255, 0.25);
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        /* Top Shine Effect */
        .card::before {
            content: "";
            position: absolute;
            top: 0; left: 15%; right: 15%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 40px;
        }

        .brand-name {
            font-size: 1.8rem;
            font-weight: 800;
            letter-spacing: -1px;
        }

        /* --- Green Pulse Indicator --- */
        .live-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--live-green);
            font-weight: 700;
        }

        .pulse-dot {
            width: 7px;
            height: 7px;
            background: var(--live-green);
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 10px var(--live-green);
        }

        .pulse-dot::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background: var(--live-green);
            border-radius: 50%;
            animation: pulse-ring 2s infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3.5); opacity: 0; }
        }

        /* --- Three-Segmented Progress Bar --- */
        .segmented-bar {
            display: flex;
            gap: 8px;
            height: 10px;
            margin-bottom: 12px;
        }

        .segment {
            flex: 1;
            background: var(--segment-bg);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }

        .segment-fill {
            position: absolute;
            top: 0; left: 0; height: 100%; width: 100%;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 1s cubic-bezier(0.65, 0, 0.35, 1);
        }

        /* Animate segments on card hover */
        .card:hover .segment-fill { transform: scaleX(1); }

        .amazon .segment-fill { background: var(--amazon); box-shadow: 0 0 15px var(--amazon); }
        .flipkart .segment-fill { background: var(--flipkart); box-shadow: 0 0 15px var(--flipkart); }
        .meesho .segment-fill { background: var(--meesho); box-shadow: 0 0 15px var(--meesho); }

        /* Staggered Delay for segments */
        .card:hover .segment:nth-child(1) .segment-fill { transition-delay: 0.1s; }
        .card:hover .segment:nth-child(2) .segment-fill { transition-delay: 0.3s; }
        .card:hover .segment:nth-child(3) .segment-fill { transition-delay: 0.5s; }

        .bar-labels {
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 30px;
        }

        /* --- Dropdown Steps --- */
        .steps-container {
            max-height: 0;
            opacity: 0;
            transition: all 0.5s ease;
            overflow: hidden;
        }

        .card:hover .steps-container {
            max-height: 200px;
            opacity: 1;
            margin-top: 20px;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 14px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.7);
            transform: translateY(10px);
            transition: 0.4s ease;
        }

        .card:hover .step-item { transform: translateY(0); }

        .check-box {
            width: 20px;
            height: 20px;
            background: rgba(0, 255, 170, 0.1);
            border: 1px solid rgba(0, 255, 170, 0.2);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--live-green);
            font-size: 10px;
        }

        /* --- Back To Center Button --- */
        .back-btn {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            text-decoration: none;
            z-index: 100;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .btn-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px 28px;
            border-radius: 100px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .back-btn:hover { transform: translateX(-50%) translateY(-5px); }
        .back-btn:active { transform: translateX(-50%) scale(0.95); }

        /* Mobile */
        @media (max-width: 768px) {
            .container { flex-direction: column; align-items: center; }
            .card { width: 90vw; }
        }
    </style>
</head>
<body>

    <h1>System Synchronized</h1>

    <div class="container">
        <div class="card amazon">
            <div class="header">
                <span class="brand-name" style="color: var(--amazon);">Amazon</span>
                <div class="live-indicator"><div class="pulse-dot"></div> LIVE</div>
            </div>
            <div class="segmented-bar">
                <div class="segment"><div class="segment-fill"></div></div>
                <div class="segment"><div class="segment-fill"></div></div>
                <div class="segment"><div class="segment-fill"></div></div>
            </div>
            <div class="bar-labels"><span>FILED</span><span>LISTED</span><span>LIVE</span></div>
            <div class="steps-container">
                <div class="step-item" style="transition-delay: 0.1s;"><div class="check-box">✓</div> Application Filed</div>
                <div class="step-item" style="transition-delay: 0.2s;"><div class="check-box">✓</div> Listed</div>
                <div class="step-item" style="transition-delay: 0.3s;"><div class="check-box">✓</div> Store is Live</div>
            </div>
        </div>

        <div class="card flipkart">
            <div class="header">
                <span class="brand-name" style="color: var(--flipkart);">Flipkart</span>
                <div class="live-indicator"><div class="pulse-dot"></div> LIVE</div>
            </div>
            <div class="segmented-bar">
                <div class="segment"><div class="segment-fill"></div></div>
                <div class="segment"><div class="segment-fill"></div></div>
                <div class="segment"><div class="segment-fill"></div></div>
            </div>
            <div class="bar-labels"><span>FILED</span><span>LISTED</span><span>LIVE</span></div>
            <div class="steps-container">
                <div class="step-item" style="transition-delay: 0.1s;"><div class="check-box">✓</div> Application Filed</div>
                <div class="step-item" style="transition-delay: 0.2s;"><div class="check-box">✓</div> Listed</div>
                <div class="step-item" style="transition-delay: 0.3s;"><div class="check-box">✓</div> Store is Live</div>
            </div>
        </div>

        <div class="card meesho">
            <div class="header">
                <span class="brand-name" style="color: var(--meesho);">Meesho</span>
                <div class="live-indicator"><div class="pulse-dot"></div> LIVE</div>
            </div>
            <div class="segmented-bar">
                <div class="segment"><div class="segment-fill"></div></div>
                <div class="segment"><div class="segment-fill"></div></div>
                <div class="segment"><div class="segment-fill"></div></div>
            </div>
            <div class="bar-labels"><span>FILED</span><span>LISTED</span><span>LIVE</span></div>
            <div class="steps-container">
                <div class="step-item" style="transition-delay: 0.1s;"><div class="check-box">✓</div> Application Filed</div>
                <div class="step-item" style="transition-delay: 0.2s;"><div class="check-box">✓</div> Listed</div>
                <div class="step-item" style="transition-delay: 0.3s;"><div class="check-box">✓</div> Store is Live</div>
            </div>
        </div>
    </div>

    <a href="home.html" class="back-btn">
        <div class="btn-glass">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                <polyline points="9 22 9 12 15 12 15 22"></polyline>
            </svg>
            Back to Center
        </div>
    </a>

</body>
</html>
