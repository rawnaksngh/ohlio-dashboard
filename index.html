<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Oli-Ohh Launch Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial; }
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white; min-height: 100vh; }
        
        header { padding: 25px; text-align: center; font-size: 32px; font-weight: bold; background: rgba(0, 0, 0, 0.4); }
        nav { display: flex; justify-content: center; gap: 30px; padding: 12px; background: #111; position: sticky; top: 0; z-index: 100; }
        nav a { color: white; text-decoration: none; font-weight: 600; }
        nav a:hover { color: #00ffd5; }
        
        .container { 
            padding: 30px; 
            position: relative; 
            min-height: 80vh; 
            z-index: 1;
        }
        
        /* THE WATERMARK LOGO - Increased opacity slightly to ensure visibility */
        .background-watermark {
            position: fixed; /* Fixed so it stays centered while scrolling */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50%;
            max-width: 500px;
            opacity: 0.15; /* Adjusted for better visibility through glass */
            z-index: 0; 
            pointer-events: none;
            mix-blend-mode: overlay; /* Helps it blend with the background gradient */
        }

        /* KPI Cards - Changed to semi-transparent white */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; position: relative; z-index: 2; }
        .card { 
            background: rgba(255, 255, 255, 0.85); /* SEMI-TRANSPARENT */
            backdrop-filter: blur(5px);
            color: black; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.3); 
        }
        .card:hover { transform: translateY(-12px) scale(1.07); background: rgba(255, 255, 255, 1); }
        .card.active { outline: 3px solid #00ffd5; }
        
        /* Table - Changed to semi-transparent white */
        table { 
            width: 100%; border-collapse: collapse; 
            background: rgba(255, 255, 255, 0.85); /* SEMI-TRANSPARENT */
            backdrop-filter: blur(10px);
            color: black; border-radius: 10px; overflow: hidden; margin-top: 20px; 
            position: relative; z-index: 2; 
        }
        th { background: rgba(0, 119, 255, 0.9); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        tr:hover { background: rgba(0, 0, 0, 0.05); }

        .owner-panel { margin-top: 30px; background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 12px; position: relative; z-index: 2; }
        .chart-container { width: 350px; margin: auto; margin-top: 40px; background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 15px; position: relative; z-index: 2; }

        footer { text-align: center; padding: 40px 20px; background: rgba(0, 0, 0, 0.6); margin-top: 50px; position: relative; z-index: 2; }
    </style>
</head>
<body>

<img src="logo.png" alt="Watermark" class="background-watermark">

<header>Oli-Ohh Pasta Launch Command Center</header>

<nav>
    <a href="#dashboard">Dashboard</a>
    <a href="#tasks">Launch Tasks</a>
</nav>

<div class="container">
    <section id="dashboard">
        <div class="dashboard">
            <div class="card active" data-status="all"><h2>Total Tasks</h2><h1 id="totalTasks">0</h1></div>
            <div class="card" data-status="Completed"><h2>Completed</h2><h1 id="completedTasks">0</h1></div>
            <div class="card" data-status="In Progress"><h2>In Progress</h2><h1 id="progressTasks">0</h1></div>
            <div class="card" data-status="Pending"><h2>Pending</h2><h1 id="pendingTasks">0</h1></div>
        </div>
    </section>

    <section id="tasks">
        <table id="taskTable">
            <thead>
                <tr><th>Category</th><th>Activity</th><th>Owner</th><th>Status</th></tr>
            </thead>
            <tbody>
                <tr><td>Launching</td><td>3 Tier Launch Plan</td><td>Sunil</td><td><span class="status progressing">In Progress</span></td></tr>
                <tr><td>Launching</td><td>Oli-Ohh Launch Ceremony</td><td>Akshay</td><td><span class="status progressing">In Progress</span></td></tr>
                <tr><td>Strategy</td><td>100 Retailors Roadmap</td><td>Sunil</td><td><span class="status pending">Pending</span></td></tr>
            </tbody>
        </table>
    </section>

    <div class="chart-container"><canvas id="taskChart"></canvas></div>
</div>

<script>
    // [Keep your existing JavaScript logic for KPIs and Charts here]
    const rows = document.querySelectorAll("#taskTable tbody tr");
    function initializeKPIs() {
        let total = 0, comp = 0, prog = 0, pend = 0;
        rows.forEach(row => {
            total++;
            const st = row.cells[3].textContent.trim();
            if (st.includes("Completed")) comp++;
            else if (st.includes("In Progress")) prog++;
            else if (st.includes("Pending")) pend++;
        });
        document.getElementById("totalTasks").innerText = total;
        document.getElementById("completedTasks").innerText = comp;
        document.getElementById("progressTasks").innerText = prog;
        document.getElementById("pendingTasks").innerText = pend;
        
        const ctx = document.getElementById('taskChart').getContext('2d');
        new Chart(ctx, {
            type: "doughnut",
            data: {
                labels: ["Completed", "In Progress", "Pending"],
                datasets: [{ data: [comp, prog, pend], backgroundColor: ["#2ecc71", "#f39c12", "#e74c3c"], borderWidth: 0 }]
            },
            options: { plugins: { legend: { labels: { color: 'white' } } } }
        });
    }
    window.onload = initializeKPIs;
</script>
</body>
</html>
