<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oli-Ohh | Secure Access</title>
    <link rel="icon" href="https://img.icons8.com/fluency/48/lock.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Using solid colors instead of heavy blurs for TV performance */
            --glass: rgba(20, 20, 25, 0.95); 
            --glass-border: rgba(255, 255, 255, 0.15);
            --ios-cyan: #00ffd5;
            --ios-red: #ff3b30;
            --text-glow: 0 0 15px rgba(0, 255, 213, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; cursor: default; }

        body {
            background-color: #050508;
            color: white;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
            /* Static gradient is much faster than animated ones on TV hardware */
            background: radial-gradient(circle at center, #111 0%, #050508 100%);
        }

        .login-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 40px; padding: 50px 40px;
            width: 90%; max-width: 420px; text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            /* Hardware acceleration triggers */
            transform: translateZ(0);
            will-change: transform, opacity;
            animation: entrance 0.8s ease-out forwards;
        }

        @keyframes entrance { 
            from { opacity: 0; transform: translateY(20px) scale(0.98); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }

        .hi-akshay {
            font-size: 3rem; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 10px;
            color: #fff;
            text-shadow: var(--text-glow);
        }

        .status-label { font-size: 0.8rem; font-weight: 600; color: rgba(255, 255, 255, 0.4); text-transform: uppercase; letter-spacing: 3px; }

        .pin-wrapper { display: flex; justify-content: center; gap: 12px; margin: 35px 0; }
        
        .pin-box {
            width: 55px; height: 75px; 
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid var(--glass-border); border-radius: 15px;
            font-size: 1.8rem; font-weight: 700; color: white; text-align: center; outline: none;
            transition: border-color 0.2s, transform 0.2s;
        }

        .pin-box:focus {
            border-color: var(--ios-cyan);
            transform: scale(1.05);
        }

        .reset-container { display: none; flex-direction: column; gap: 10px; margin-top: 15px; }
        
        .input-field {
            background: rgba(255, 255, 255, 0.07); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 14px; color: white; font-size: 1rem; text-align: center; outline: none;
        }

        .unlock-btn {
            background: var(--ios-cyan); color: #000; border: none; padding: 16px; border-radius: 20px;
            font-weight: 800; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;
            cursor: pointer; width: 100%;
            transition: transform 0.2s;
        }

        .unlock-btn:active { transform: scale(0.95); }

        .reset-link {
            margin-top: 20px; font-size: 0.7rem; color: rgba(255, 255, 255, 0.3); 
            letter-spacing: 1px; cursor: pointer;
        }

        /* Simplified Shake for TV */
        .shake { animation: haptic 0.3s ease-in-out; }
        @keyframes haptic { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        
        .success-exit { opacity: 0; transform: scale(0.95); transition: 0.4s ease-in; }
    </style>
</head>
<body>

    <div class="login-card" id="loginCard">
        <h1 class="hi-akshay" id="titleText">Hi Akshay</h1>
        <p class="status-label" id="statusText">Authentication Required</p>

        <div id="loginView">
            <div class="pin-wrapper">
                <input type="password" inputmode="numeric" maxlength="1" class="pin-box" autofocus>
                <input type="password" inputmode="numeric" maxlength="1" class="pin-box">
                <input type="password" inputmode="numeric" maxlength="1" class="pin-box">
                <input type="password" inputmode="numeric" maxlength="1" class="pin-box">
            </div>
            <button class="unlock-btn" onclick="validateAccess()">Unlock Dashboard</button>
            <p class="reset-link" onclick="toggleView('reset')">SETTINGS / RESET PIN</p>
        </div>

        <div id="resetView" class="reset-container">
            <input type="password" id="oldPin" class="input-field" placeholder="Verify Current PIN">
            <input type="password" id="newPin" class="input-field" placeholder="New 4-Digit PIN">
            <input type="password" id="confirmPin" class="input-field" placeholder="Confirm New PIN">
            <button class="unlock-btn" style="margin-top: 10px;" onclick="handlePinUpdate()">Update PIN</button>
            <p class="reset-link" onclick="toggleView('login')">CANCEL</p>
        </div>
    </div>

    <script>
        const boxes = document.querySelectorAll('.pin-box');
        const card = document.getElementById('loginCard');
        
        const MASTER_PIN = "1090"; 
        let akshayPin = localStorage.getItem('akshay_pin') || "1234"; 

        boxes.forEach((box, i) => {
            box.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && i < boxes.length - 1) {
                    boxes[i + 1].focus();
                }
                const typedPin = Array.from(boxes).map(b => b.value).join('');
                if (typedPin.length === 4) {
                    setTimeout(validateAccess, 100);
                }
            });

            box.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && i > 0) {
                    boxes[i - 1].focus();
                }
            });
        });

        function validateAccess() {
            const enteredPin = Array.from(boxes).map(b => b.value).join('');
            
            if (enteredPin === MASTER_PIN || enteredPin === akshayPin) {
                card.classList.add('success-exit');
                setTimeout(() => { window.location.href = 'home.html'; }, 400);
            } else {
                card.classList.add('shake');
                boxes.forEach(b => {
                    b.value = '';
                    b.style.borderColor = 'var(--ios-red)';
                });
                setTimeout(() => {
                    card.classList.remove('shake');
                    boxes.forEach(b => b.style.borderColor = '');
                    boxes[0].focus();
                }, 300);
            }
        }

        function toggleView(view) {
            const loginView = document.getElementById('loginView');
            const resetView = document.getElementById('resetView');
            const title = document.getElementById('titleText');

            if (view === 'reset') {
                loginView.style.display = 'none';
                resetView.style.display = 'flex';
                title.innerText = "Settings";
            } else {
                loginView.style.display = 'block';
                resetView.style.display = 'none';
                title.innerText = "Hi Akshay";
            }
        }

        function handlePinUpdate() {
            const oldVal = document.getElementById('oldPin').value;
            const newVal = document.getElementById('newPin').value;
            const confVal = document.getElementById('confirmPin').value;

            if (oldVal !== akshayPin && oldVal !== MASTER_PIN) {
                alert("Auth failed.");
                return;
            }
            if (newVal.length !== 4) {
                alert("Need 4 digits.");
                return;
            }
            if (newVal !== confVal) {
                alert("Mismatch.");
                return;
            }

            localStorage.setItem('akshay_pin', newVal);
            alert("Updated!");
            location.reload(); 
        }
    </script>
</body>
</html>
