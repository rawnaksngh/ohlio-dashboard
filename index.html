<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Oli-Ohh Launch Command Center</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial; }
        body { background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); color: white; min-height: 100vh; position: relative; }
        
        /* LOGO FIX: Glass Frame Container */
        .logo-container {
            position: absolute;
            top: 10px;
            left: 20px;
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.9); /* White glass base */
            border-radius: 12px; /* Matches card corners */
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1001;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3), 0 0 10px rgba(0, 255, 213, 0.2);
            overflow: hidden;
            transition: transform 0.3s ease;
            border: 1px solid rgba(0, 255, 213, 0.4);
        }

        .brand-logo {
            width: 90%; /* Fits inside the glass frame */
            height: auto;
            display: block;
        }

        .logo-container:hover { transform: scale(1.1) rotate(2deg); }

        header { padding: 25px; text-align: center; font-size: 32px; font-weight: bold; background: rgba(0, 0, 0, 0.4); }
        nav { display: flex; justify-content: center; gap: 30px; padding: 12px; background: #111; position: sticky; top: 0; z-index: 100; }
        nav a { color: white; text-decoration: none; font-weight: 600; }
        nav a:hover { color: #00ffd5; }
        .container { padding: 30px; }
        
        /* KPI Cards */
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { 
            background: white; color: black; padding: 20px; border-radius: 12px; text-align: center; cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4); 
        }
        .card:hover { transform: translateY(-12px) scale(1.07); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .card.active { outline: 3px solid #00ffd5; }
        
        /* Table & Panels */
        .owner-panel, .chart-container { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); 
            padding: 20px; border-radius: 12px; border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        
        table { 
            width: 100%; border-collapse: collapse; background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(10px); color: white; border-radius: 10px; overflow: hidden; margin-top: 20px; 
        }
        th { background: rgba(0, 119, 255, 0.6); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        
        .special-link-container { display: inline-flex; align-items: center; gap: 10px; padding: 8px 15px; background: rgba(0, 119, 255, 0.1); border-radius: 8px; text-decoration: none; transition: 0.3s; }
        .activity-link { color: #00ffd5; font-weight: 700; text-decoration: none; }
        
        .status { padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; text-transform: uppercase; }
        .done { background: #2ecc71; color: white; } .progressing { background: #f39c12; color: white; } .pending { background: #e74c3c; color: white; }
        
        /* Suggestion Widget */
        .suggestion-widget { position: fixed; top: 20px; right: 20px; display: flex; flex-direction: column; align-items: center; z-index: 9999; animation: floatWidget 3s ease-in-out infinite; }
        .suggestion-btn { background: linear-gradient(135deg, #00c6ff, #0072ff); width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; text-decoration: none; color: white; box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4); }
        @keyframes floatWidget { 0% { transform: translateY(0px); } 50% { transform: translateY(12px); } 100% { transform: translateY(0px); } }

        footer { text-align: center; padding: 40px 20px; background: rgba(0, 0, 0, 0.6); margin-top: 50px; border-top: 1px solid rgba(0, 255, 213, 0.2); }
    </style>
</head>
<body>

<div class="logo-container">
    <img src="logo.png" alt="Oli-Ohh Logo" class="brand-logo">
</div>

<header>Oli-Ohh Pasta Launch Command Center</header>

<nav>
    <a href="#dashboard">Dashboard</a>
    <a href="#tasks">Launch Tasks</a>
</nav>

<div class="container">
    <section id="dashboard">
        <div class="dashboard">
            <div class="card active" data-status="all"><h2>Total Tasks</h2><h1 id="totalTasks">0</h1></div>
            <div class="card" data-status="Completed"><h2>Completed</h2><h1 id="completedTasks">0</h1></div>
            <div class="card" data-status="In Progress"><h2>In Progress</h2><h1 id="progressTasks">0</h1></div>
            <div class="card" data-status="Pending"><h2>Pending</h2><h1 id="pendingTasks">0</h1></div>
        </div>
    </section>

    <section id="tasks">
        <table id="taskTable">
            <thead>
                <tr><th>Category</th><th>Activity</th><th>Owner</th><th>Status</th></tr>
            </thead>
            <tbody>
                <tr><td>Launching</td><td><a href="#" class="special-link-container"><span class="activity-link">3 Tier Launch Plan</span></a></td><td>Sunil</td><td><span class="status progressing">In Progress</span></td></tr>
                <tr><td>Launching</td><td>Oli-Ohh Launch Ceremony</td><td>Akshay</td><td><span class="status progressing">In Progress</span></td></tr>
                <tr><td>Strategy</td><td>100 Retailors Roadmap</td><td>Sunil</td><td><span class="status pending">Pending</span></td></tr>
            </tbody>
        </table>
    </section>

    <div class="chart-container"><canvas id="taskChart"></canvas></div>
</div>

<div class="suggestion-widget">
    <a href="#" class="suggestion-btn">💡</a>
</div>

<script>
    const rows = document.querySelectorAll("#taskTable tbody tr");
    function initializeKPIs() {
        let total = 0, comp = 0, prog = 0, pend = 0;
        rows.forEach(row => {
            total++;
            const st = row.cells[3].textContent.trim();
            if (st.includes("Completed")) comp++;
            else if (st.includes("In Progress")) prog++;
            else if (st.includes("Pending")) pend++;
        });
        document.getElementById("totalTasks").innerText = total;
        document.getElementById("completedTasks").innerText = comp;
        document.getElementById("progressTasks").innerText = prog;
        document.getElementById("pendingTasks").innerText = pend;
        initChart(comp, prog, pend);
    }

    function initChart(comp, prog, pend) {
        const ctx = document.getElementById('taskChart').getContext('2d');
        new Chart(ctx, {
            type: "doughnut",
            data: {
                labels: ["Completed", "In Progress", "Pending"],
                datasets: [{ data: [comp, prog, pend], backgroundColor: ["#2ecc71", "#f39c12", "#e74c3c"], borderWidth: 0 }]
            },
            options: { plugins: { legend: { labels: { color: 'white' } } } }
        });
    }

    window.onload = initializeKPIs;

    document.querySelectorAll(".card").forEach(card => {
        card.onclick = () => {
            const status = card.dataset.status;
            document.querySelectorAll(".card").forEach(c => c.classList.remove("active"));
            card.classList.add("active");
            rows.forEach(row => {
                const rowStatus = row.cells[3].innerText;
                row.style.display = (status === "all" || rowStatus.includes(status)) ? "" : "none";
            });
        };
    });
</script>
</body>
</html>
