<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oli-Ohh | Secure Access</title>
    <link rel="icon" href="https://img.icons8.com/fluency/48/lock.png">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.12);
            --ios-cyan: #00ffd5;
            --ios-red: #ff3b30;
            --spring: cubic-bezier(0.16, 1, 0.3, 1);
            --text-glow: rgba(0, 255, 213, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; cursor: default; }

        body {
            background-color: #020205;
            color: white;
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .ambient-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(10, 132, 255, 0.15) 0%, transparent 40%),
                        radial-gradient(circle at 80% 70%, rgba(175, 82, 222, 0.1) 0%, transparent 40%);
            filter: blur(80px); animation: drift 20s ease infinite alternate;
        }

        @keyframes drift { from { transform: scale(1); } to { transform: scale(1.1) translate(5%, 5%); } }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(50px) saturate(200%);
            border: 1px solid var(--glass-border);
            border-radius: 54px; padding: 60px 40px;
            width: 90%; max-width: 440px; text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.7);
            animation: entrance 1.4s var(--spring);
            position: relative; z-index: 10;
        }

        @keyframes entrance { from { opacity: 0; transform: scale(0.9) translateY(40px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .hi-akshay {
            font-size: 3.2rem; font-weight: 800; letter-spacing: -2.5px; margin-bottom: 8px;
            background: linear-gradient(180deg, #ffffff 40%, var(--ios-cyan) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 40px var(--text-glow);
        }

        .status-label { font-size: 0.85rem; font-weight: 600; color: rgba(255, 255, 255, 0.35); text-transform: uppercase; letter-spacing: 4px; }

        /* PIN Inputs */
        .pin-wrapper { display: flex; justify-content: center; gap: 15px; margin: 40px 0; }
        .pin-box {
            width: 60px; height: 80px; background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border); border-radius: 20px;
            font-size: 2rem; font-weight: 700; color: white; text-align: center; outline: none; transition: 0.4s var(--spring);
        }
        .pin-box:focus {
            border-color: var(--ios-cyan); box-shadow: 0 0 25px var(--text-glow); transform: scale(1.05) translateY(-5px);
        }

        /* Reset View Container */
        .reset-container { display: none; flex-direction: column; gap: 12px; margin-top: 20px; }
        .input-field {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--glass-border);
            border-radius: 15px; padding: 15px; color: white; font-size: 1rem; text-align: center; outline: none;
        }
        .input-field:focus { border-color: var(--ios-cyan); }

        .unlock-btn {
            background: var(--ios-cyan); color: #000; border: none; padding: 18px 50px; border-radius: 24px;
            font-weight: 800; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: 0.5s var(--spring); box-shadow: 0 15px 35px rgba(0, 255, 213, 0.3);
            width: 100%;
        }
        .unlock-btn:hover { transform: translateY(-3px); background: #fff; }

        .reset-link {
            margin-top: 25px; font-size: 0.75rem; color: rgba(255, 255, 255, 0.3); 
            letter-spacing: 1px; cursor: pointer; transition: 0.3s;
        }
        .reset-link:hover { color: var(--ios-cyan); }

        .shake { animation: hapticShake 0.4s ease-in-out; }
        @keyframes hapticShake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-10px); } 40%, 80% { transform: translateX(10px); } }
        
        .success-exit { animation: exitOut 0.6s var(--spring) forwards; }
        @keyframes exitOut { to { opacity: 0; transform: scale(0.85) translateY(-30px); filter: blur(20px); } }
    </style>
</head>
<body>
    <div class="ambient-bg"></div>

    <div class="login-card" id="loginCard">
        <h1 class="hi-akshay" id="titleText">Hi Akshay</h1>
        <p class="status-label" id="statusText">Authentication Required</p>

        <!-- LOGIN VIEW -->
        <div id="loginView">
            <div class="pin-wrapper">
                <input type="password" maxlength="1" class="pin-box" autofocus>
                <input type="password" maxlength="1" class="pin-box">
                <input type="password" maxlength="1" class="pin-box">
                <input type="password" maxlength="1" class="pin-box">
            </div>
            <button class="unlock-btn" onclick="validateAccess()">Unlock Dashboard</button>
            <p class="reset-link" onclick="toggleView('reset')">SETTINGS / RESET PIN</p>
        </div>

        <!-- RESET VIEW -->
        <div id="resetView" class="reset-container">
            <input type="password" id="oldPin" class="input-field" placeholder="Enter Current User PIN">
            <input type="password" id="newPin" class="input-field" placeholder="New 4-Digit PIN">
            <input type="password" id="confirmPin" class="input-field" placeholder="Confirm New PIN">
            <button class="unlock-btn" style="margin-top: 10px;" onclick="handlePinUpdate()">Update PIN</button>
            <p class="reset-link" onclick="toggleView('login')">CANCEL</p>
        </div>
    </div>

    <script>
        const boxes = document.querySelectorAll('.pin-box');
        const card = document.getElementById('loginCard');
        
        // PIN KEYS
        const MASTER_PIN = "1090"; // Permanent Master Key
        let akshayPin = localStorage.getItem('akshay_pin') || "1234"; // Initial User Key

        // 1. Auto-focus and Auto-Login
        boxes.forEach((box, i) => {
            box.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && i < boxes.length - 1) {
                    boxes[i + 1].focus();
                }
                
                // Automatic check when last box is filled
                const typedPin = Array.from(boxes).map(b => b.value).join('');
                if (typedPin.length === 4) {
                    setTimeout(validateAccess, 250);
                }
            });

            box.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && i > 0) {
                    boxes[i - 1].focus();
                }
            });
        });

        // 2. Validate function
        function validateAccess() {
            const enteredPin = Array.from(boxes).map(b => b.value).join('');
            
            if (enteredPin === MASTER_PIN || enteredPin === akshayPin) {
                // Success logic
                card.classList.add('success-exit');
                setTimeout(() => { 
                    window.location.href = 'home.html'; 
                }, 600);
            } else {
                // Shake and clear on error
                card.classList.add('shake');
                boxes.forEach(b => {
                    b.value = '';
                    b.style.borderColor = 'var(--ios-red)';
                });
                setTimeout(() => {
                    card.classList.remove('shake');
                    boxes.forEach(b => b.style.borderColor = '');
                    boxes[0].focus();
                }, 400);
            }
        }

        // 3. UI Switcher
        function toggleView(view) {
            const loginView = document.getElementById('loginView');
            const resetView = document.getElementById('resetView');
            const title = document.getElementById('titleText');

            if (view === 'reset') {
                loginView.style.display = 'none';
                resetView.style.display = 'flex';
                title.innerText = "Settings";
            } else {
                loginView.style.display = 'block';
                resetView.style.display = 'none';
                title.innerText = "Hi Akshay";
                boxes[0].focus();
            }
        }

        // 4. Update Logic (For Akshay's PIN)
        function handlePinUpdate() {
            const oldVal = document.getElementById('oldPin').value;
            const newVal = document.getElementById('newPin').value;
            const confVal = document.getElementById('confirmPin').value;

            // Must know current user pin or master pin to change user pin
            if (oldVal !== akshayPin && oldVal !== MASTER_PIN) {
                alert("Incorrect authorization PIN.");
                return;
            }

            if (newVal.length !== 4 || isNaN(newVal)) {
                alert("Please enter a 4-digit number.");
                return;
            }

            if (newVal !== confVal) {
                alert("New PINs do not match.");
                return;
            }

            // Save to browser memory
            localStorage.setItem('akshay_pin', newVal);
            akshayPin = newVal;
            
            alert("Akshay's PIN updated successfully!");
            location.reload(); 
        }
    </script>
</body>
</html>
