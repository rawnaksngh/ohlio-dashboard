<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Futuristic NCR Operations</title>
    <style>
        :root {
            --bg: #050505;
            --card-bg: rgba(255, 255, 255, 0.04);
            --accent: #007AFF; 
            --accent-glow: rgba(0, 122, 255, 0.4);
            --text-main: #FFFFFF;
            --text-dim: #A1A1A6;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", sans-serif;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 0%, rgba(0, 122, 255, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 0% 100%, rgba(0, 122, 255, 0.05) 0%, transparent 30%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-bottom: 80px;
        }

        /* --- STICKY HOME BUTTON --- */
        .home-nav {
            position: absolute;
            top: clamp(15px, 4vw, 30px);
            left: clamp(15px, 4vw, 30px);
            z-index: 1000;
        }

        .home-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .home-btn span {
            color: white;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .home-btn svg {
            fill: white;
            width: 16px;
            height: 16px;
        }

        .home-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* --- HEADER --- */
        header {
            padding: 120px 24px 60px 24px;
            text-align: center;
            width: 100%;
        }

        header h1 {
            font-size: clamp(2.2rem, 8vw, 3.8rem);
            font-weight: 700;
            letter-spacing: -0.04em;
            background: linear-gradient(180deg, #fff 20%, #888 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }

        header p {
            color: var(--text-dim);
            font-size: clamp(0.95rem, 4vw, 1.2rem);
            font-weight: 400;
            letter-spacing: 0.02em;
        }

        /* --- FLOW CONTAINER --- */
        .flow-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px;
        }

        .central-line {
            position: absolute;
            top: 0;
            bottom: 0;
            left: 50%;
            width: 2px;
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(-50%);
            z-index: 0;
        }

        .energy-beam {
            position: absolute;
            top: 0;
            left: 50%;
            width: 2px;
            height: 20vh;
            background: linear-gradient(to bottom, transparent, var(--accent), transparent);
            transform: translateX(-50%);
            z-index: 1;
            animation: beamMove 5s infinite ease-in-out;
        }

        @keyframes beamMove {
            0% { top: -20vh; }
            100% { top: 100%; }
        }

        .step-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 40px 0;
            z-index: 2;
            opacity: 0;
            transform: scale(0.9) translateY(40px);
            transition: opacity 0.8s ease, transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .step-wrapper.active {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        .node {
            width: 14px;
            height: 14px;
            background: var(--bg);
            border: 2px solid var(--accent);
            border-radius: 50%;
            margin-bottom: 25px;
            box-shadow: 0 0 15px var(--accent-glow);
            transition: all 0.6s ease;
        }

        .step-wrapper.active .node {
            background: var(--accent);
            transform: scale(1.1);
            box-shadow: 0 0 25px var(--accent);
        }

        /* --- UPDATED CARD WITH SMOOTH ZOOM --- */
        .card {
            width: 100%;
            max-width: 460px;
            background: var(--card-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: clamp(24px, 6vw, 35px);
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.4);
            /* Smooth Zoom Transition */
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1), 
                        border-color 0.4s ease,
                        background-color 0.4s ease;
            cursor: pointer;
        }

        .card:hover {
            transform: scale(1.03); /* Subtle Smooth Zoom */
            border-color: rgba(255, 255, 255, 0.25);
            background: rgba(255, 255, 255, 0.07);
        }

        .step-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--accent);
            margin-bottom: 12px;
            display: block;
        }

        .step-title {
            font-size: clamp(1.2rem, 5vw, 1.5rem);
            font-weight: 600;
            color: var(--text-main);
            line-height: 1.35;
        }

        .step-num {
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            font-size: clamp(5rem, 18vw, 8rem);
            font-weight: 900;
            color: rgba(255, 255, 255, 0.02);
            pointer-events: none;
            width: 100%;
            text-align: center;
            z-index: -1;
        }

        @media only screen and (max-width: 480px) {
            header { padding-top: 100px; }
            .home-nav { top: 20px; left: 20px; }
            .step-wrapper { margin: 25px 0; }
            .card:hover { transform: scale(1.02); } /* Slightly less zoom on mobile to prevent clipping */
        }
    </style>
</head>
<body>

    <nav class="home-nav">
        <a href="home.html" class="home-btn">
            <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            <span>Home</span>
        </a>
    </nav>

    <header>
        <h1>Operational Flow</h1>
        <p>Delhi NCR Activation Roadmap</p>
    </header>

    <main class="flow-container" id="flow">
        <div class="central-line"></div>
        <div class="energy-beam"></div>
    </main>

    <script>
        const data = [
            { id: "01", title: "Delhi NCR Operations Initiated" },
            { id: "02", title: "POSM Deployment (Dangler, Poster, Banner)" },
            { id: "03", title: "Wet Sampling Phase" },
            { id: "04", title: "Full Store Activation" },
            { id: "05", title: "Top Store Visits & Feedback Loops" },
            { id: "06", title: "Taste Confirmation & Order Finalization" },
            { id: "07", title: "Purchase Order (PO) Receiving" },
            { id: "08", title: "PO Fulfillment & Logistics" },
            { id: "09", title: "Expansion to All Available Stores (DRCP)" },
            { id: "10", title: "Strategic Seller Visits" }
        ];

        const container = document.getElementById('flow');

        data.forEach((item) => {
            const wrapper = document.createElement('div');
            wrapper.className = 'step-wrapper';
            wrapper.innerHTML = `
                <div class="step-num">${item.id}</div>
                <div class="node"></div>
                <div class="card">
                    <span class="step-label">Phase ${item.id}</span>
                    <div class="step-title">${item.title}</div>
                </div>
            `;
            container.appendChild(wrapper);
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.15 });

        document.querySelectorAll('.step-wrapper').forEach(el => observer.observe(el));
    </script>
</body>
</html>
