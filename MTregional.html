<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regional Account Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Precision ultra-thin scrollbar for high-density TV grids */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #090d16;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 2px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans antialiased h-screen flex flex-col overflow-hidden text-[9px] uppercase tracking-normal select-none">

    <header class="bg-slate-900 border-b border-slate-800 px-2.5 py-0.5 flex flex-row justify-between items-center shrink-0 shadow-md h-7">
        <div class="flex items-center gap-2">

            </a>
            <div class="bg-indigo-600 px-1 py-0.5 rounded text-white shadow-sm">
                <i class="fa-solid fa-chart-line text-[8px]"></i>
            </div>
            <div class="flex items-baseline gap-1.5">
                <h1 class="text-[10px] font-black tracking-wider text-white leading-none">Oli Ohh &bull; Grid System</h1>
                <p class="text-[8px] text-indigo-400 font-mono tracking-normal lowercase p-0 m-0 leading-none">v2.2 // regional distribution interface</p>
            </div>
        </div>
        
        <div class="flex items-center gap-3 text-[8px]">
            <div class="flex items-center gap-1 bg-slate-950 px-1.5 py-0.5 rounded border border-slate-800 text-slate-400 font-mono">
                <span class="w-1 h-1 rounded-full bg-emerald-500 animate-pulse"></span>
                <span>Routes:</span>
                <span class="text-emerald-400 font-bold" id="headerRouteCounter">101 Points</span>
            </div>
            <button onclick="resetAllFilters()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 px-1.5 py-0.5 rounded border border-slate-700 transition flex items-center gap-1 font-bold cursor-pointer text-[8px]">
                <i class="fa-solid fa-rotate-left text-slate-400"></i> Reset
            </button>
        </div>
    </header>

    <main class="flex-1 flex flex-row overflow-hidden w-full bg-slate-950">

        <section class="w-[280px] shrink-0 bg-slate-900/40 border-r border-slate-900 flex flex-col overflow-hidden">
            <div class="px-2 py-0.5 bg-slate-900 border-b border-slate-800 flex justify-between items-center shrink-0 h-6">
                <span class="text-[9px] font-black text-slate-400 flex items-center gap-1 tracking-wider">
                    <i class="fa-solid fa-table-cells text-indigo-500"></i> Summary Matrix
                </span>
                <span class="text-[8px] bg-slate-950 text-slate-500 border border-slate-800 px-1 rounded font-mono font-bold">SYS/NAV</span>
            </div>

            <div class="p-1 bg-slate-900/60 border-b border-slate-800 shrink-0">
                <select id="regionFilter" onchange="handleRegionChange()" class="w-full text-[9px] font-mono bg-slate-950 border border-slate-800 rounded px-1.5 py-0.5 text-slate-300 focus:outline-none focus:border-indigo-600 cursor-pointer h-5">
                    <option value="">[ All Operational Regions ]</option>
                    <option value="Central">Central</option>
                    <option value="East">East</option>
                    <option value="North">North</option>
                    <option value="South">South</option>
                    <option value="West">West</option>
                </select>
            </div>

            <div class="flex-1 overflow-auto">
                <table class="w-full border-collapse text-left text-[9px] font-mono leading-none">
                    <thead class="sticky top-0 bg-slate-900 border-b border-slate-800 text-slate-400 font-bold z-10">
                        <tr>
                            <th class="py-1 px-1.5 border-r border-slate-950">Region</th>
                            <th class="py-1 px-1.5 border-r border-slate-950">VTC</th>
                            <th class="py-1 px-1 border-r border-slate-950 text-center text-purple-500 w-16">SKU Type</th>
                            <th class="py-1 px-1.5 text-right text-slate-300 w-16">Total Accounts</th>
                        </tr>
                    </thead>
                    <tbody id="summaryBody" class="divide-y divide-slate-900/60 bg-slate-950/20">
                    </tbody>
                </table>
            </div>
            
            <div class="p-1 border-t border-slate-900 bg-slate-900/20 text-[8px] text-slate-500 font-mono tracking-tight lowercase normal-case">
                * Select any underlining locator code to map data streams.
            </div>
        </section>

        <section class="flex-1 bg-slate-950 flex flex-col overflow-hidden">
            
            <div class="p-1 bg-slate-900/20 border-b border-slate-900 flex flex-row justify-between items-center gap-2 shrink-0 h-6">
                <div class="flex items-center gap-1.5">
                    <div id="statusIndicatorBlob" class="w-1 h-1 rounded-full bg-indigo-500"></div>
                    <div class="text-[9px] font-mono">
                        <span class="text-slate-500">Pipeline:</span>
                        <span id="activeFilterLabel" class="text-slate-300 font-bold ml-1">All Accounts Matrix</span>
                    </div>
                    <span id="activeCountBadge" class="text-[8px] font-mono bg-slate-900 text-indigo-400 px-1 py-0.5 rounded border border-slate-800 font-bold ml-1">0 lines</span>
                </div>

                <div class="relative w-48">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-1.5 text-slate-600">
                        <i class="fa-solid fa-magnifying-glass text-[8px]"></i>
                    </span>
                    <input type="text" id="rightPaneSearch" oninput="applyFilteringAndRender()" placeholder="Search metrics or hubs..." class="w-full text-[9px] font-mono normal-case pl-4.5 pr-1 py-0.5 bg-slate-900 border border-slate-800 rounded focus:outline-none focus:border-indigo-600 text-slate-200 placeholder-slate-600 h-4.5">
                </div>
            </div>

            <div class="flex-1 overflow-auto flex flex-col">
                <div class="flex-1 overflow-auto">
                    <table class="w-full border-collapse text-left text-[9px] font-mono leading-none">
                        <thead class="sticky top-0 bg-slate-900 border-b border-slate-800 text-slate-400 font-bold z-10">
                            <tr>
                                <th class="py-1 px-1.5 border-r border-slate-950 w-12">Region</th>
                                <th class="py-1 px-1.5 border-r border-slate-950 w-20">City</th>

                                <th class="py-1 px-1.5 border-r border-slate-950 text-center w-12">Stores</th>
                                <th class="py-1 px-1.5 border-r border-slate-950 text-amber-500 w-24">Status</th>

                            </tr>
                        </thead>
                        <tbody id="accountBody" class="divide-y divide-slate-900">
                        </tbody>
                        <tfoot class="sticky bottom-0 bg-slate-900 border-t border-slate-700 text-slate-100 font-bold z-10 shadow-[0_-2px_6px_rgba(0,0,0,0.6)]">
                            <tr id="accountFooterRow">
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
        </section>

            {"Region": "West", "VTC Mapping": "Maharashtra", "City": "Pune", "Account": "FOOD JUNCTION", "Status": "Pending", "PO Value": "-", "Remarks": ""},

            {"Region": "North", "VTC Mapping": "NCR", "City": "Noida - Ghaziabad", "Account": "VDH", "Status": "Order received", "PO Value": 1, "Remarks": "Order placed"},
            {"Region": "North", "VTC Mapping": "NCR", "City": "New Delhi", "Account": "Baniya Ki dukan", "Status": "Pending", "PO Value": "-", "Remarks": "Product Sample shared"},
            {"Region": "North", "VTC Mapping": "NCR", "City": "New Delhi", "Account": "Raj Mandir", "Status": "Pending", "PO Value": "-", "Remarks": ""},
            {"Region": "North", "VTC Mapping": "NCR", "City": "New Delhi", "Account": "Kondli Bazaar", "Status": "Order received", "PO Value": 1, "Remarks": "Order placed"}
        ];

        const accountStoreCounts = {
            "Wellness": 44, "FRANK ROSE": 1, "Modern Bazaar": 23, "SHOP EXPRESS": 7, "ASIANA FOOD & BEVERAGE LLP": 1,
            "Daily Needs": 2, "Dastak": 2, "FOODSTORIES PRIVATE LIMITED": 3, "Geom365": 22, "Honey Money Top": 5,
            "Marche Retail": 13, "NEEDS RETAIL": 1, "Ssm Retail Pvt Ltd": 9, "LOTS": 7, "NUTS N MORE": 4,
            "Worldwide delight Pvt Ltd": 3, "BuyBuy Technologies Private Limited": 1, "Fresh Lee": 7, "M/S DEBON": 1,
            "Shreejee Foods": 5, "JOIN COMMERCE PRIVATE LIMITED": 1, "ABHYUDAY ESSENTIALS": 1, "NU Farm Market LLP": 2,
            "Punjab Stores": 3, "ABNI ENTERPRISES": 2, "M/S ABHYUDAY FOOD ENTERPRISES": 1, "NUTS WORLD": 1,
            "Fresh N Easy": 2, "Suvidha": 2, "Ratnadeep": 137, "Ajfan": 9, "INDWELL RETAIL PRIVATE LIMITED": 1,
            "Namdhari Agro Fresh Pvt. Ltd.": 12, "Pothys": 4, "USHODAYA SUPER MARKETS PRIVATE LIMITED": 13,
            "CROSSWORD BOOKSTORES PVT LTD": 2, "Magson": 17, "DANGEE DUMS LIMITED": 1, "MAGSON RETAIL AND DISTRIBUTION LIMITED": 1,
            "NAMH MEDITECH PRIVATE LIMITED": 5, "SHREEJI KAJUWALA AND DRY FRUITS": 4, "SUPERCENTRE RETAILHUB PRIVATE LIMITED": 5,
            "SUPREME TRADERS": 6, "TIGMON FOODS LLP": 2, "CHANDAN SUPER MART": 3, "JAGDISH FARSHAN PVT LTD": 13,
            "JAGDISH FOODS PVTLTD": 4, "AVARYA RETAIL PRIVATE LIMITED": 4, "Eden Super market": 5, "MERICAN FOODS": 1,
            "SOCIETY STORES RETAIL PVT LTD": 7, "Dorabjee": 11, "FOOD JUNCTION": 12, "VDH": 2, "Baniya Ki dukan": 19,
            "Raj Mandir": 60, "Kondli Bazaar": 1
        };

        let selectedVtcFilter = null;
        let selectedRegionFilter = "";
        let openAccounts = {};

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('headerRouteCounter').innerText = `${accountRows.length} Points`;
            generateSummaryPane();
            applyFilteringAndRender();
        });

        function generateSummaryPane() {
            const body = document.getElementById('summaryBody');
            body.innerHTML = '';

            // Map each VTC code to a unique list of account names
            const vtcAccountMap = {};
            accountRows.forEach(row => {
                const vtc = row['VTC Mapping'];
                const accountName = row['Account'];
                if (!vtcAccountMap[vtc]) {
                    vtcAccountMap[vtc] = new Set();
                }
                vtcAccountMap[vtc].add(accountName);
            });

            // Update row counters dynamically based on distinct groupings
            let dynamicGrandTotalSum = 0;
            summaryRows.forEach(row => {
                const isTotal = row['Region'] === 'Grand Total' || row['VTC Mapping'] === 'Grand Total';
                if (!isTotal) {
                    const uniqueCount = vtcAccountMap[row['VTC Mapping']] ? vtcAccountMap[row['VTC Mapping']].size : 0;
                    row['Grand Total'] = uniqueCount;
                    
                    // Add up visible matrices for the localized responsive grand running footer element
                    if (!selectedRegionFilter || row['Region'] === selectedRegionFilter) {
                        dynamicGrandTotalSum += uniqueCount;
                    }
                }
            });

            // Update data element placeholder for the terminal view configuration block
            const grandTotalObj = summaryRows.find(row => row['Region'] === 'Grand Total' || row['VTC Mapping'] === 'Grand Total');
            if (grandTotalObj) {
                grandTotalObj['Grand Total'] = dynamicGrandTotalSum;
            }

            summaryRows.forEach(row => {
                const isTotal = row['Region'] === 'Grand Total' || row['VTC Mapping'] === 'Grand Total';
                if (!isTotal && selectedRegionFilter && row['Region'] !== selectedRegionFilter) return;

                const tr = document.createElement('tr');
                tr.className = 'h-5';
                
                if (isTotal) {
                    tr.className += ' bg-slate-900 font-extrabold border-t border-slate-700 text-slate-100';
                } else {
                    const isActive = selectedVtcFilter === row['VTC Mapping'];
                    tr.className += ` transition-all border-b border-slate-900/40 ${isActive ? 'bg-indigo-950/70 font-bold text-white border-l border-l-indigo-500' : 'hover:bg-slate-900/30 text-slate-300'}`;
                }

                const sku = row['DC/DSD based on SKU'] !== '' ? row['DC/DSD based on SKU'] : '-';

                let vtcMarkup = '';
                if (isTotal) {
                    vtcMarkup = `<span class="font-bold text-slate-500">Total</span>`;
                } else {
                    vtcMarkup = `<span class="underline decoration-slate-900 hover:decoration-indigo-500 text-indigo-400 cursor-pointer font-bold" onclick="toggleVtcFilter('${row['VTC Mapping']}')">${row['VTC Mapping']}</span>`;
                }

                tr.innerHTML = `
                    <td class="py-0.5 px-1.5 border-r border-slate-900 text-slate-500 truncate max-w-[65px]">${isTotal ? '' : row['Region']}</td>
                    <td class="py-0.5 px-1.5 border-r border-slate-900 font-bold">${vtcMarkup}</td>
                    <td class="py-0.5 px-1 border-r border-slate-900 text-center text-purple-400/90">${sku}</td>
                    <td class="py-0.5 px-1.5 text-right font-black bg-slate-900/20">${row['Grand Total']}</td>
                `;
                body.appendChild(tr);
            });
        }

        function handleRegionChange() {
            selectedRegionFilter = document.getElementById('regionFilter').value;
            selectedVtcFilter = null; 
            openAccounts = {};
            generateSummaryPane();
            applyFilteringAndRender();
        }

        function toggleVtcFilter(vtcValue) {
            selectedVtcFilter = (selectedVtcFilter === vtcValue) ? null : vtcValue;
            openAccounts = {};
            generateSummaryPane();
            applyFilteringAndRender();
        }

        function toggleAccountDropdown(accountName) {
            openAccounts[accountName] = !openAccounts[accountName];
            applyFilteringAndRender(true);
        }

        function applyFilteringAndRender(isCollapsingOnly = false) {
            const tbody = document.getElementById('accountBody');
            const searchVal = document.getElementById('rightPaneSearch').value.toLowerCase().trim();
            
            const filtered = accountRows.filter(row => {
                if(row['Region'] === 'Grand Total') return false;
                const matchesRegion = selectedRegionFilter ? String(row['Region']).toLowerCase() === selectedRegionFilter.toLowerCase() : true;
                const matchesVtc = selectedVtcFilter ? String(row['VTC Mapping']).toLowerCase() === selectedVtcFilter.toLowerCase() : true;
                
                let matchesSearch = true;
                if (searchVal) {
                    matchesSearch = 
                        String(row['Region']).toLowerCase().includes(searchVal) ||
                        String(row['City']).toLowerCase().includes(searchVal) ||
                        String(row['Account']).toLowerCase().includes(searchVal) ||
                        String(row['Status']).toLowerCase().includes(searchVal);
                }
                return matchesRegion && matchesVtc && matchesSearch;
            });

            tbody.innerHTML = '';
            let grandTotalStores = 0;

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center py-8 text-slate-600 font-mono text-[9px]">
                            NO MOUNTED METRICS IN DATA STREAM
                        </td>
                    </tr>
                `;
            } else {
                const groups = {};
                filtered.forEach(row => {
                    if (!groups[row.Account]) groups[row.Account] = [];
                    groups[row.Account].push(row);
                });

                const dynamicAccountCount = Object.keys(groups).length;

                Object.keys(groups).forEach(accountName => {
                    const rows = groups[accountName];
                    const hasMultiple = rows.length > 1;
                    const isExpanded = !!openAccounts[accountName];
                    
                    let totalStores = accountStoreCounts[accountName] !== undefined ? accountStoreCounts[accountName] : rows.length;
                    grandTotalStores += totalStores;

                    if (hasMultiple) {
                        const headerTr = document.createElement('tr');
                        headerTr.className = 'bg-slate-900/50 hover:bg-slate-900 cursor-pointer border-b border-slate-900 text-slate-300 select-none h-5 font-bold';
                        headerTr.onclick = () => toggleAccountDropdown(accountName);

                        const commonStatus = rows[0]['Status'];
                        const commonPO = rows[0]['PO Value'];
                        const commonRemark = rows[0]['Remarks'];

                        headerTr.innerHTML = `
                            <td class="py-0.5 px-1.5 border-r border-slate-900 text-slate-500 font-medium">${rows[0]['Region'] || ''}</td>
                            <td class="py-0.5 px-1.5 border-r border-slate-900 text-slate-400 italic">(${rows.length} cities)</td>
                            <td class="py-0.5 px-2 border-r border-slate-950 text-slate-100 tracking-normal normal-case font-black flex items-center justify-between">
                                <span class="flex items-center gap-1.5 text-indigo-400">
                                    <i class="fa-solid ${isExpanded ? 'fa-chevron-down' : 'fa-chevron-right'} text-[7px] w-2"></i>
                                    ${accountName}
                                </span>
                                <span class="text-[7.5px] font-mono text-indigo-400/80 bg-indigo-950/40 border border-indigo-900/30 px-1 rounded-sm lowercase">${rows.length} streams</span>
                            </td>
                            <td class="py-0.5 px-1.5 border-r border-slate-900 text-center font-black text-indigo-400 bg-slate-900/30">${totalStores}</td>
                            <td class="py-0.5 px-1.5 border-r border-slate-900 text-amber-500/90 font-bold">${commonStatus}</td>
                            <td class="py-0.5 px-1.5 border-r border-slate-900 text-emerald-500 font-bold">${commonPO}</td>
                            <td class="py-0.5 px-1.5 text-slate-400 normal-case font-sans text-[8.5px] truncate max-w-[176px]" title="${commonRemark}">${commonRemark || '-'}</td>
                        `;
                        tbody.appendChild(headerTr);

                        if (isExpanded) {
                            rows.forEach(row => {
                                renderRowElement(tbody, row, true);
                            });
                        }
                    } else {
                        renderRowElement(tbody, rows[0], false, totalStores);
                    }
                });

                const footerRow = document.getElementById('accountFooterRow');
                footerRow.className = 'h-5';
                footerRow.innerHTML = `
                    <td class="py-0.5 px-1.5 border-r border-slate-950 text-slate-400 font-black">TOTAL</td>
                    <td class="py-0.5 px-1.5 border-r border-slate-950 text-slate-600">-</td>
                    <td class="py-0.5 px-2 border-r border-slate-950 text-slate-400 font-bold tracking-tight lowercase normal-case">${dynamicAccountCount} accounts active</td>
                    <td class="py-0.5 px-1.5 border-r border-slate-950 text-center font-black text-emerald-400 bg-emerald-950/20 text-[10px]">${grandTotalStores}</td>
                    <td class="py-0.5 px-1.5 border-r border-slate-950 text-slate-600">-</td>
                    <td class="py-0.5 px-1.5 border-r border-slate-950 text-slate-600">-</td>
                    <td class="py-0.5 px-1.5 text-slate-500 text-[8px] italic font-normal tracking-tight">* localized running counter</td>
                `;
            }

            if(!isCollapsingOnly) {
                const statusBlob = document.getElementById('statusIndicatorBlob');
                const label = document.getElementById('activeFilterLabel');
                
                if (selectedRegionFilter || selectedVtcFilter) {
                    statusBlob.className = 'w-1 h-1 rounded-full bg-amber-400 animate-pulse';
                    let filterTxt = '';
                    if (selectedRegionFilter) filterTxt += `R: ${selectedRegionFilter}`;
                    if (selectedVtcFilter) filterTxt += `${selectedRegionFilter ? ' | ' : ''}VTC: ${selectedVtcFilter}`;
                    label.innerHTML = `<span class="text-amber-400 font-bold">${filterTxt}</span>`;
                } else {
                    statusBlob.className = 'w-1 h-1 rounded-full bg-indigo-500';
                    label.innerText = 'All Accounts Matrix';
                }

                document.getElementById('activeCountBadge').innerText = `${filtered.length} lines`;
            }
        }

        function renderRowElement(tbody, row, isSubNode, singleStoreCount = 1) {
            const tr = document.createElement('tr');
            tr.className = 'h-5 transition-colors font-mono';
            tr.className += isSubNode 
                ? ' bg-slate-950/40 hover:bg-slate-900/40 text-slate-400 border-b border-slate-900/40'
                : ' hover:bg-slate-900 text-slate-300 border-b border-slate-900';

            const poValue = row['PO Value'] !== undefined ? row['PO Value'] : '-';
            const customRemarks = row['Remarks'] !== undefined ? row['Remarks'] : '';
            
            const indentStyle = isSubNode ? 'pl-5 text-slate-400/60 border-l border-indigo-900/40 italic text-[8.5px]' : '';

            tr.innerHTML = `
                <td class="py-0.5 px-1.5 border-r border-slate-900 text-slate-500 truncate max-w-[50px]">${row['Region'] || ''}</td>
                <td class="py-0.5 px-1.5 border-r border-slate-900 text-slate-400 truncate max-w-[85px]">${row['City'] || ''}</td>
                <td class="py-0.5 px-2 border-r border-slate-950 text-slate-100 font-bold tracking-normal normal-case truncate max-w-[150px] ${indentStyle}">
                    ${isSubNode ? '<span class="text-indigo-600/50 mr-1">&bull;</span>' : ''}${row['Account'] || ''}
                </td>
                <td class="py-0.5 px-1.5 border-r border-slate-900 text-center font-bold text-slate-300">${isSubNode ? '-' : singleStoreCount}</td>
                <td class="py-0.5 px-1.5 border-r border-slate-900 text-amber-500/90 font-bold">${row['Status'] || '-'}</td>
                <td class="py-0.5 px-1.5 border-r border-slate-900 text-emerald-500 font-bold">${poValue}</td>
                <td class="py-0.5 px-1.5 text-slate-400 max-w-[176px] truncate normal-case font-sans text-[8.5px]" title="${customRemarks}">${customRemarks || '-'}</td>
            `;
            tbody.appendChild(tr);
        }

        function resetAllFilters() {
            selectedVtcFilter = null;
            selectedRegionFilter = "";
            openAccounts = {};
            document.getElementById('regionFilter').value = "";
            document.getElementById('rightPaneSearch').value = '';
            generateSummaryPane();
            applyFilteringAndRender();
        }
    </script>
