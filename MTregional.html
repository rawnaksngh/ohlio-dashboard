<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regional Account Dashboard</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Precision ultra-thin scrollbar for high-density TV grids */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }
        ::-webkit-scrollbar-track {
            background: #090d16;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #334155;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 font-sans antialiased h-screen flex flex-col overflow-hidden text-[11px] uppercase tracking-wide">

    <!-- High-Density Main Header -->
    <header class="bg-slate-900 border-b border-slate-800 px-4 py-2 flex flex-row justify-between items-center shrink-0 shadow-lg">
        <div class="flex items-center gap-2.5">
            <a href="home.html" class="bg-slate-800 hover:bg-indigo-600 text-slate-300 hover:text-white p-1.5 rounded transition duration-150" title="Go to Home">
                <i class="fa-solid fa-house text-xs"></i>
            </a>
            <div class="bg-indigo-600 p-1.5 rounded text-white shadow-sm">
                <i class="fa-solid fa-chart-line text-xs"></i>
            </div>
            <div>
                <h1 class="text-xs font-black tracking-wider text-white">Oli Ohh &bull; Grid System</h1>
                <p class="text-[9px] text-indigo-400 font-mono tracking-normal lowercase">v2.1 // regional distribution interface</p>
            </div>
        </div>
        
        <div class="flex items-center gap-4 text-[10px]">
            <div class="flex items-center gap-1.5 bg-slate-950 px-2.5 py-1 rounded border border-slate-800 text-slate-400 font-mono">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                <span>Routes:</span>
                <span class="text-emerald-400 font-bold">53 Points</span>
            </div>
            <button onclick="resetAllFilters()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 px-2.5 py-1 rounded border border-slate-700 transition flex items-center gap-1.5 font-bold text-[10px] cursor-pointer">
                <i class="fa-solid fa-rotate-left text-slate-400"></i> Reset Grid
            </button>
        </div>
    </header>

    <!-- Operational Hub Workspace -->
    <main class="flex-1 flex flex-row overflow-hidden w-full bg-slate-950">

        <!-- LEFT CONTROL PANEL: Matrix Cards & Filter Dropdown -->
        <section class="w-[340px] shrink-0 bg-slate-900/40 border-r border-slate-900 flex flex-col overflow-hidden">
            <div class="p-2 bg-slate-900 border-b border-slate-800 flex justify-between items-center shrink-0">
                <span class="text-[10px] font-black text-slate-400 flex items-center gap-1.5 tracking-widest">
                    <i class="fa-solid fa-table-cells text-indigo-500 text-[10px]"></i> Summary Matrix
                </span>
                <span class="text-[9px] bg-slate-950 text-slate-400 border border-slate-800 px-1.5 py-0.5 rounded font-mono font-bold">SYS/NAV</span>
            </div>

            <!-- Compact Region Selection Block -->
            <div class="p-2 bg-slate-900/60 border-b border-slate-800 shrink-0">
                <select id="regionFilter" onchange="handleRegionChange()" class="w-full text-[10px] font-mono bg-slate-950 border border-slate-800 rounded px-2 py-1 text-slate-300 focus:outline-none focus:border-indigo-600 cursor-pointer">
                    <option value="">[ All Operational Regions ]</option>
                    <option value="Central">Central</option>
                    <option value="East">East</option>
                    <option value="North">North</option>
                    <option value="South">South</option>
                    <option value="West">West</option>
                </select>
            </div>

            <!-- Highly Compressed Metric List Panel -->
            <div class="flex-1 overflow-auto p-1.5 space-y-1" id="matrixCardContainer">
                <!-- Built dynamically via Javascript as high-density micro-cards -->
            </div>
            
            <div class="p-2 border-t border-slate-900 bg-slate-900/20 text-[9px] text-slate-500 font-mono tracking-normal normal-case">
                * Select any underlining locator code to map data streams.
            </div>
        </section>


        <!-- RIGHT CONTROL PANEL: High-Density Account Data Matrix -->
        <section class="flex-1 bg-slate-950 flex flex-col overflow-hidden">
            
            <!-- Context Control Strip -->
            <div class="p-2 bg-slate-900/20 border-b border-slate-900 flex flex-row justify-between items-center gap-2 shrink-0">
                <div class="flex items-center gap-2">
                    <div id="statusIndicatorBlob" class="w-1.5 h-1.5 rounded-full bg-indigo-500"></div>
                    <div class="text-[10px] font-mono">
                        <span class="text-slate-500">Pipeline:</span>
                        <span id="activeFilterLabel" class="text-slate-300 font-bold ml-1">All Accounts Matrix</span>
                    </div>
                    <span id="activeCountBadge" class="text-[9px] font-mono bg-slate-900 text-indigo-400 px-1.5 py-0.5 rounded border border-slate-800 font-bold ml-1">0 lines</span>
                </div>

                <!-- Concentrated Instant Filter -->
                <div class="relative w-56">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-slate-600">
                        <i class="fa-solid fa-magnifying-glass text-[9px]"></i>
                    </span>
                    <input type="text" id="rightPaneSearch" oninput="applyFilteringAndRender()" placeholder="Search metrics or hubs..." class="w-full text-[10px] font-mono normal-case pl-6 pr-2 py-1 bg-slate-900 border border-slate-800 rounded focus:outline-none focus:border-indigo-600 text-slate-200 placeholder-slate-600">
                </div>
            </div>

            <!-- Core Sheet Canvas -->
            <div class="flex-1 overflow-auto">
                <table class="w-full border-collapse text-left text-[10px] font-mono">
                    <thead class="sticky top-0 bg-slate-900 border-b border-slate-800 text-slate-400 font-bold z-10">
                        <tr>
                            <th class="py-1.5 px-3 border-r border-slate-950">Region</th>
                            <th class="py-1.5 px-3 border-r border-slate-950">Serviced By</th>
                            <th class="py-1.5 px-3 border-r border-slate-950">Mapping</th>
                            <th class="py-1.5 px-3 border-r border-slate-950">City</th>
                            <th class="py-1.5 px-3 border-r border-slate-950 text-slate-200 font-black">Account Name</th>
                            <th class="py-1.5 px-3 border-r border-slate-950">Chain Status</th>
                            <th class="py-1.5 px-3 border-r border-slate-950 text-center">Stores</th>
                            <th class="py-1.5 px-3 border-r border-slate-950 text-amber-500">Status</th>
                            <th class="py-1.5 px-3 border-r border-slate-950 text-emerald-500">PO Value</th>
                            <th class="py-1.5 px-3 text-slate-500">Remarks</th>
                        </tr>
                    </thead>
                    <tbody id="accountBody" class="divide-y divide-slate-900">
                        <!-- Populated dynamic -->
                    </tbody>
                </table>
            </div>
            
        </section>

    </main>

        let selectedVtcFilter = null;
        let selectedRegionFilter = "";

        document.addEventListener('DOMContentLoaded', () => {
            generateSummaryPane();
            applyFilteringAndRender();
        });

        // Transformed tabular structure to localized compact flex cards for TV spatial clarity
        function generateSummaryPane() {
            const container = document.getElementById('matrixCardContainer');
            container.innerHTML = '';

            summaryRows.forEach(row => {
                const isTotal = row['Region'] === 'Grand Total' || row['VTC Mapping'] === 'Grand Total';
                if (!isTotal && selectedRegionFilter && row['Region'] !== selectedRegionFilter) return;

                const card = document.createElement('div');
                
                if (isTotal) {
                    card.className = 'bg-slate-900 border border-slate-700 p-2 rounded flex flex-row justify-between items-center text-slate-100 font-extrabold mt-2';
                    card.innerHTML = `
                        <span class="text-[10px] text-slate-400 font-black">GRAND TOTAL BLOCK</span>
                        <div class="flex gap-3 text-[10px]">
                            <span class="text-emerald-400">DSD:${row['DSD']}</span>
                            <span class="text-sky-400">DC:${row['DC']}</span>
                            <span class="text-purple-400">SKU:${row['DC/DSD based on SKU']}</span>
                            <span class="text-white border-l border-slate-700 pl-2 font-mono bg-slate-950 px-1.5 rounded">Σ ${row['Grand Total']}</span>
                        </div>
                    `;
                } else {
                    const isActive = selectedVtcFilter === row['VTC Mapping'];
                    card.className = `border p-1.5 rounded transition-all ${isActive ? 'bg-indigo-950/70 border-indigo-500 shadow' : 'bg-slate-900/40 border-slate-900 hover:border-slate-800'}`;
                    
                    const dsd = row['DSD'] !== '' ? `DSD:${row['DSD']}` : '';
                    const dc = row['DC'] !== '' ? `DC:${row['DC']}` : '';
                    const sku = row['DC/DSD based on SKU'] !== '' ? `SKU:${row['DC/DSD based on SKU']}` : '';

                    card.innerHTML = `
                        <div class="flex flex-row justify-between items-center gap-1">
                            <div class="flex items-center gap-1.5">
                                <span class="text-slate-500 font-bold text-[9px] w-12 truncate">${row['Region']}</span>
                                <span class="underline decoration-slate-700 hover:decoration-indigo-400 text-indigo-400 cursor-pointer font-black font-mono text-xs" onclick="toggleVtcFilter('${row['VTC Mapping']}')">${row['VTC Mapping']}</span>
                            </div>
                            <div class="flex items-center gap-2 text-[9px] font-mono text-slate-400">
                                <span class="${dsd ? 'text-emerald-500/90 font-bold bg-emerald-950/20 px-1 rounded' : ''}">${dsd}</span>
                                <span class="${dc ? 'text-sky-400/90 font-bold bg-sky-950/20 px-1 rounded' : ''}">${dc}</span>
                                <span class="${sku ? 'text-purple-400/90 font-bold bg-purple-950/20 px-1 rounded' : ''}">${sku}</span>
                                <span class="text-white font-black bg-slate-900 border border-slate-800 px-1 rounded text-[10px] min-w-[18px] text-center">${row['Grand Total']}</span>
                            </div>
                        </div>
                    `;
                }
                container.appendChild(card);
            });
        }

        function handleRegionChange() {
            selectedRegionFilter = document.getElementById('regionFilter').value;
            selectedVtcFilter = null; 
            generateSummaryPane();
            applyFilteringAndRender();
        }

        function toggleVtcFilter(vtcValue) {
            selectedVtcFilter = (selectedVtcFilter === vtcValue) ? null : vtcValue;
            generateSummaryPane();
            applyFilteringAndRender();
        }

        function applyFilteringAndRender() {
            const tbody = document.getElementById('accountBody');
            const searchVal = document.getElementById('rightPaneSearch').value.toLowerCase().trim();
            tbody.innerHTML = '';

            const filtered = accountRows.filter(row => {
                const matchesRegion = selectedRegionFilter ? String(row['Region']).toLowerCase() === selectedRegionFilter.toLowerCase() : true;
                const matchesVtc = selectedVtcFilter ? String(row['VTC Mapping']).toLowerCase() === selectedVtcFilter.toLowerCase() : true;
                
                let matchesSearch = true;
                if (searchVal) {
                    matchesSearch = 
                        String(row['Region']).toLowerCase().includes(searchVal) ||
                        String(row['City']).toLowerCase().includes(searchVal) ||
                        String(row['Account']).toLowerCase().includes(searchVal) ||
                        String(row['Supply Status']).toLowerCase().includes(searchVal);
                }
                return matchesRegion && matchesVtc && matchesSearch;
            });

            if (filtered.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="10" class="text-center py-12 text-slate-600 font-mono text-[10px]">
                            <i class="fa-solid fa-folder-open text-base mb-1 block text-slate-700"></i>
                            NO MOUNTED METRICS IN DATA STREAM
                        </td>
                    </tr>
                `;
            } else {
                filtered.forEach(row => {
                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-slate-900 text-slate-300 transition-colors border-b border-slate-900';

                    let badgeColor = 'bg-slate-900 text-slate-500 border-slate-800';
                    if (row['Supply Status'] === 'DSD') badgeColor = 'bg-emerald-950/30 text-emerald-400 border-emerald-900/60';
                    else if (row['Supply Status'] === 'DC') badgeColor = 'bg-sky-950/30 text-sky-400 border-sky-900/60';
                    else if (row['Supply Status'] && row['Supply Status'].includes('SKU')) badgeColor = 'bg-purple-950/30 text-purple-400 border-purple-900/60';

                    const currentStatus = row['Current Status'] !== undefined ? row['Current Status'] : '-';
                    const poValue = row['PO Value'] !== undefined ? row['PO Value'] : '-';
                    const customRemarks = row['Remarks'] !== undefined ? row['Remarks'] : '';

                    tr.innerHTML = `
                        <td class="py-1 px-3 border-r border-slate-900 text-slate-500">${row['Region'] || ''}</td>
                        <td class="py-1 px-3 border-r border-slate-900 text-[9px] text-slate-500 font-bold">${row['Currently serviced by'] || ''}</td>
                        <td class="py-1 px-3 border-r border-slate-900"><span class="text-slate-300 font-bold">${row['VTC Mapping'] || ''}</span></td>
                        <td class="py-1 px-3 border-r border-slate-900 text-slate-400">${row['City'] || ''}</td>
                        <td class="py-1 px-3 border-r border-slate-900 text-slate-100 font-bold tracking-normal normal-case">${row['Account'] || ''}</td>
                        <td class="py-1 px-3 border-r border-slate-900"><span class="px-1.5 py-0.5 rounded text-[9px] border font-bold ${badgeColor}">${row['Supply Status'] || ''}</span></td>
                        <td class="py-1 px-3 border-r border-slate-900 text-center font-bold text-slate-300">${row['Distinct Count of Store Name'] !== undefined ? row['Distinct Count of Store Name'] : ''}</td>
                        
                        <td class="py-1 px-3 border-r border-slate-900 text-amber-500/90 font-bold">${currentStatus}</td>
                        <td class="py-1 px-3 border-r border-slate-900 text-emerald-500 font-bold">${poValue}</td>
                        <td class="py-1 px-3 text-slate-500 max-w-[140px] truncate normal-case" title="${customRemarks}">${customRemarks || '-'}</td>
                    `;
                    tbody.appendChild(tr);
                });
            }

            const statusBlob = document.getElementById('statusIndicatorBlob');
            const label = document.getElementById('activeFilterLabel');
            
            if (selectedRegionFilter || selectedVtcFilter) {
                statusBlob.className = 'w-1.5 h-1.5 rounded-full bg-amber-400 animate-pulse';
                let filterTxt = '';
                if (selectedRegionFilter) filterTxt += `R: ${selectedRegionFilter}`;
                if (selectedVtcFilter) filterTxt += `${selectedRegionFilter ? ' | ' : ''}VTC: ${selectedVtcFilter}`;
                label.innerHTML = `<span class="text-amber-400 font-bold">${filterTxt}</span>`;
            } else {
                statusBlob.className = 'w-1.5 h-1.5 rounded-full bg-indigo-500';
                label.innerText = 'All Accounts Matrix';
            }

            document.getElementById('activeCountBadge').innerText = `${filtered.length} lines`;
        }

        function resetAllFilters() {
            selectedVtcFilter = null;
            selectedRegionFilter = "";
            document.getElementById('regionFilter').value = "";
            document.getElementById('rightPaneSearch').value = '';
            generateSummaryPane();
            applyFilteringAndRender();
        }
    </script>
